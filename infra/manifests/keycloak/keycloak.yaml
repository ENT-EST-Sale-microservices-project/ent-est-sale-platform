# ==============================================================================
# ENT EST Salé — Keycloak 26.1.4 (plain StatefulSet — no Helm)
#
# WHY NO HELM CHART: The codecentric/keycloakx chart tpl()-renders extraEnv and
# command as string blocks. Passing --values via bash process substitution
# (<(echo "$VAR")) is silently ignored by helm in many environments, causing the
# chart to fall back to its own defaults: wrong image tag (25.0.1), no env vars,
# and no command override — so the container always prints the kc.sh help page
# and crash-loops. A plain manifest is 100% deterministic with no chart magic.
#
# KC_COMMAND : start-dev (Kind/local, HTTP, no TLS)
#              start     (prod/existing, full hardening)
#
# Rendered via:
#   envsubst '${PLATFORM_NS} ${KEYCLOAK_ADMIN} ${KEYCLOAK_PASSWORD} ${KC_COMMAND}'
# ==============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: ${PLATFORM_NS}
type: Opaque
stringData:
  KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
  KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_PASSWORD}"
  KC_DB_PASSWORD: "${KEYCLOAK_PASSWORD}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: ${PLATFORM_NS}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak
spec:
  serviceName: keycloak
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1.4
          imagePullPolicy: IfNotPresent
          args: ["${KC_COMMAND}"]
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://keycloak-postgres.${PLATFORM_NS}.svc.cluster.local:5432/keycloak"
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_PASSWORD
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: JAVA_OPTS_APPEND
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=50.0"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 36
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
              scheme: HTTP
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
              scheme: HTTP
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ${PLATFORM_NS}
  labels:
    app.kubernetes.io/name: keycloak
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: management
      port: 9000
      targetPort: 9000
