# ==============================================================================
# ENT EST Salé — PostgreSQL 16 (backing store for Keycloak)
# Rendered via:  envsubst '${PLATFORM_NS} ${KEYCLOAK_PASSWORD}'
# ==============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgres-secret
  namespace: ${PLATFORM_NS}
type: Opaque
stringData:
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: "${KEYCLOAK_PASSWORD}"
  POSTGRES_DB: keycloak
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-postgres
  namespace: ${PLATFORM_NS}
  labels:
    app.kubernetes.io/name: keycloak-postgres
spec:
  serviceName: keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: keycloak-postgres-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: ${PLATFORM_NS}
  labels:
    app.kubernetes.io/name: keycloak-postgres
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: keycloak-postgres
