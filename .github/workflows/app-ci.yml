name: app-ci

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'gateway/**'
      - 'services/**'
      - 'scripts/**'
      - 'docker-compose.yml'
      - '.env.compose.example'
      - 'docs/README-compose.md'
      - '.github/workflows/app-ci.yml'
  push:
    branches: [ main, dev, staging ]
    paths:
      - 'gateway/**'
      - 'services/**'
      - 'scripts/**'
      - 'docker-compose.yml'
      - '.env.compose.example'
      - 'docs/README-compose.md'
      - '.github/workflows/app-ci.yml'

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax compile checks
        run: |
          set -euo pipefail
          python -m py_compile \
            gateway/app/main.py \
            services/ms-auth-core/app/main.py \
            services/ms-identity-admin/app/main.py \
            services/ms-course-content/app/main.py \
            services/ms-course-access/app/main.py \
            services/ms-notification/app/main.py

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [python-sanity]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env file
        run: cp .env.compose.example .env.compose
      - name: Build and start stack
        run: docker compose --env-file .env.compose up -d --build --wait
      - name: Run one-shot initializers
        run: docker compose --env-file .env.compose up --no-deps keycloak-realm-bootstrap keycloak-users-bootstrap minio-init cassandra-init
      - name: Compose healthcheck
        run: bash scripts/compose-healthcheck.sh
      - name: RBAC smoke test
        run: bash scripts/rbac-smoke-test.sh
      - name: Course content smoke test
        run: bash scripts/course-content-smoke-test.sh
      - name: Course access smoke test
        run: bash scripts/course-access-smoke-test.sh
      - name: Identity admin smoke test
        run: bash scripts/identity-admin-smoke-test.sh
      - name: Dump logs on failure
        if: failure()
        run: docker compose --env-file .env.compose logs --no-color
      - name: Teardown
        if: always()
        run: docker compose --env-file .env.compose down -v
