name: infra-ci

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'
      - '.yamllint'
  push:
    branches: [ main, dev, staging ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'
      - '.yamllint'

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck bootstrap script
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './infra/bootstrap'

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: 'infra/manifests infra/values infra/cluster'
          config_file: '.yamllint'
          strict: false

  render-validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base
      - name: Install Python YAML parser
        run: python -m pip install --user pyyaml
      - name: Render and validate manifests
        shell: bash
        run: |
          set -euo pipefail
          source infra/.env.example
          export PLATFORM_NS APPS_NS OBS_NS TRAEFIK_NS
          export KEYCLOAK_ADMIN KEYCLOAK_PASSWORD
          export RABBITMQ_USER RABBITMQ_PASSWORD
          export MINIO_ROOT_USER MINIO_ROOT_PASSWORD
          export CASSANDRA_PASSWORD
          export KC_COMMAND=start-dev

          render_and_validate() {
            local file="$1"
            local vars="$2"
            local out="/tmp/$(basename "$file").rendered.yaml"
            envsubst "$vars" < "$file" > "$out"

            # Fail if unresolved placeholders remain after rendering.
            if grep -q '\${[A-Za-z_][A-Za-z0-9_]*}' "$out"; then
              local unresolved
              unresolved="$(grep -n '\${[A-Za-z_][A-Za-z0-9_]*}' "$out" || true)"

              # In keycloak realm bootstrap script, these are runtime shell vars
              # intentionally kept for the Job container.
              if [[ "$file" == "infra/manifests/keycloak/realm-import-job.yaml" ]]; then
                unresolved="$(printf '%s\n' "$unresolved" | grep -vE '\$\{(KEYCLOAK_ADMIN|KEYCLOAK_PASSWORD|ACCESS_TOKEN)\}' || true)"
              fi

              if [[ -n "$unresolved" ]]; then
                echo "Unresolved template variable(s) in $file"
                printf '%s\n' "$unresolved"
                exit 1
              fi
            fi

            # Offline YAML syntax validation (no Kubernetes API required).
            python -c 'import sys,yaml; from pathlib import Path; p=Path(sys.argv[1]); docs=list(yaml.safe_load_all(p.read_text(encoding="utf-8"))); docs or (_ for _ in ()).throw(SystemExit(f"No YAML document found in {p}")); [((doc is None) or isinstance(doc, dict) or (_ for _ in ()).throw(SystemExit(f"Document #{idx} in {p} is not a mapping/object")), (doc is None) or ("apiVersion" in doc) or (_ for _ in ()).throw(SystemExit(f"Document #{idx} in {p} missing required key: apiVersion")), (doc is None) or ("kind" in doc) or (_ for _ in ()).throw(SystemExit(f"Document #{idx} in {p} missing required key: kind"))) for idx, doc in enumerate(docs, 1)]; print(f"OK: {p}")' "$out"
          }

          render_and_validate infra/manifests/namespaces.yaml '${PLATFORM_NS} ${APPS_NS} ${OBS_NS} ${TRAEFIK_NS}'
          render_and_validate infra/manifests/keycloak/postgres.yaml '${PLATFORM_NS} ${KEYCLOAK_PASSWORD}'
          render_and_validate infra/manifests/keycloak/keycloak.yaml '${PLATFORM_NS} ${KEYCLOAK_ADMIN} ${KEYCLOAK_PASSWORD} ${KC_COMMAND}'
          render_and_validate infra/manifests/keycloak/realm-import-job.yaml '${PLATFORM_NS}'
          render_and_validate infra/manifests/rabbitmq/rabbitmq-cluster.yaml '${PLATFORM_NS} ${RABBITMQ_USER} ${RABBITMQ_PASSWORD}'
          render_and_validate infra/manifests/cassandra/cassandra.yaml '${PLATFORM_NS} ${CASSANDRA_PASSWORD}'
          render_and_validate infra/manifests/ingress/keycloak-ingress.yaml '${PLATFORM_NS}'
